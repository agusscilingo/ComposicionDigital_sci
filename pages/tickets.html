    <section class="titulo">
    <div class="titulo-contenido animate__animated animate__lightSpeedInLeft">
        <h1>ENTRADAS</h1>
        <p>Reservá tus entradas para la feria.</p>   
    </div>
</section>
   
<div class="container">
        <div class="row g-5 align-items-center">
            
            <div class="col-12 col-lg-6">
                <div class="card form-compra-card animate__animated animate__fadeInLeft">
                    <div class="card-body p-4 p-md-5">
                        
                        <form id="formSimulacion">
                            
                            <h4 class="form-seccion-titulo mb-4">1. Selección de Entradas</h4>
                            
                            <div class="mb-3">
                                <label for="tipoTicket" class="form-label font-textos">Tipo de entrada / Día</label>
                                <select class="form-select input-personalizado" id="tipoTicket" required>
                                    <option value="" disabled selected>Elegí tu opción...</option>
                                    <option value="8000">Lunes a jueves — $8.000</option>
                                    <option value="12000">Viernes, sábados, domingos y feriados — $12.000</option>
                                    <option value="18000">Pase tres visitas — $18.000</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label for="cantidadTickets" class="form-label font-textos">Cantidad</label>
                                <input type="number" class="form-control input-personalizado" id="cantidadTickets" min="1" max="10" value="1" required>
                            </div>

                            <hr class="my-4 text-muted">

                            <h4 class="form-seccion-titulo mb-4">2. Datos Personales</h4>

                            <div class="row g-3 mb-3">
                                <div class="col-12 col-sm-6">
                                    <label for="nombre" class="form-label font-textos">Nombre</label>
                                    <input type="text" class="form-control input-personalizado" id="nombre" placeholder="Tu nombre" required>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <label for="apellido" class="form-label font-textos">Apellido</label>
                                    <input type="text" class="form-control input-personalizado" id="apellido" placeholder="Tu apellido" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label font-textos">Correo Electrónico</label>
                                <input type="email" class="form-control input-personalizado" id="email" placeholder="ejemplo@correo.com" required>
                            </div>

                            <div class="mb-4">
                                <label for="telefono" class="form-label font-textos">Teléfono</label>
                                <input type="tel" class="form-control input-personalizado" id="telefono" placeholder="Cod. de área + número" required>
                            </div>

                            <a href="./comprar.html" class="btn boton-finalizar-compra w-100 mt-2">IR A PAGAR</a>

                        </form>

                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-6">
                <div class="contenedor-img-lateral animate__animated animate__fadeInRight">
                    <img src="../img/colegio2.jpg" alt="50° Feria Internacional del Libro" class="img-lateral">
                </div>
            </div>
        </div>
    </div>
